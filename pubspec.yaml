name: test_ia
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  dartz: ^0.10.1
  envied: ^1.2.0
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_screenutil: ^5.9.3
  get_it: ^8.2.0
  go_router: ^16.1.0
  injectable: ^2.5.1
  logger: ^2.6.1
  email_validator: ^3.0.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  flutter_secure_storage: ^10.3.1
  dio: ^5.9.2
  connectivity_plus: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  build_runner: ^2.6.0
  envied_generator: ^1.2.0
  flutter_gen_runner: ^5.11.0
  flutter_launcher_icons: ^0.14.4
  injectable_generator: ^2.8.1
  mockito: ^5.5.0
  freezed: ^3.2.3
  json_serializable: ^6.11.2

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/launcher/launcher.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/launcher/launcher.png"
    background_color: "#hexcode"
    theme_color: "#FFFFFF"
  windows:
    generate: true
    image_path: "assets/launcher/launcher.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/launcher/launcher.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - locales/IN_ID.json
    - locales/EN_US.json
